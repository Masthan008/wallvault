name: wallvault
description: "WallVault — Premium Wallpaper Marketplace with Creator Economy"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  # --- State Management ---
  flutter_riverpod: ^3.3.2
  riverpod_annotation: ^4.0.3

  # --- Navigation ---
  go_router: ^17.3.0

  # --- Firebase ---
  firebase_core: ^4.12.1
  firebase_auth: ^6.5.6
  cloud_firestore: ^6.7.1
  firebase_storage: ^13.4.5
  firebase_messaging: ^16.4.3
  firebase_analytics: ^12.4.5
  firebase_crashlytics: ^5.2.6

  # --- Auth ---
  google_sign_in: ^6.3.0
  sign_in_with_apple: ^8.1.0

  # --- Payments ---
  razorpay_flutter: ^1.3.7

  # --- Images & Media ---
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  image_cropper: ^12.2.1

  # --- UI & Animations ---
  google_fonts: ^8.2.0
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2
  lottie: ^3.3.1
  flutter_staggered_grid_view: ^0.7.0
  smooth_page_indicator: ^2.0.1

  # --- Utilities ---
  intl: ^0.20.3
  share_plus: ^13.2.1
  url_launcher: ^6.3.1
  path_provider: ^2.1.5
  uuid: ^4.5.1
  flutter_secure_storage: ^10.3.1
  connectivity_plus: ^7.3.0

  # --- Crypto (for Apple Sign-In nonce) ---
  crypto: ^3.0.6

  # --- Icons ---
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.4
  build_runner: ^2.4.14

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/lottie/
    - assets/icons/
